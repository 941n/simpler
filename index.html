<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/text.css" />
    <link rel="stylesheet" href="styles/sampler.css" />

    <script src="scripts/sampleControl.js" defer></script>
    <script src="scripts/sampler.js" defer></script>
  </head>
  <body>
    <h1 id="track-name">runaway</h1>
    <h2 id="lyric">look at you</h2>
    <div id="sampler">
      <ul id="pads">
        <li class="pad" data-sample="first_note.m4a" class="note"></li>
        <li class="pad" data-sample="second_note.m4a" class="note"></li>
        <li class="pad" data-sample="third_note.m4a" class="note"></li>
        <li class="pad" data-sample="fourth_note.m4a" class="note"></li>
        <li class="pad" data-sample="fiveth_note.m4a" class="note"></li>
        <li class="pad" data-sample="sixth_note.m4a" class="note"></li>
        <li class="pad" data-sample="seventh_note.m4a" class="note"></li>
        <li class="pad" data-sample="eighth_note.m4a" class="note"></li>
        <li class="pad" data-sample="start_intro.m4a" id="start-intro"></li>
        <li class="pad" data-sample="look_at_you.m4a" class="voice-sample"></li>
        <li
          class="pad"
          data-sample="ladies_and_gentlemen.m4a"
          class="voice-sample"
        ></li>
        <li class="pad" data-sample="" id="pause"></li>
        <li class="pad" data-sample=""></li>
        <li class="pad" data-sample=""></li>
        <li class="pad" data-sample=""></li>
        <li class="pad" data-sample=""></li>
      </ul>
    </div>
    <audio class="sample" id="note" style="display: none" src=""></audio>
    <audio class="sample" id="start-intro" style="display: none" src=""></audio>
    <audio
      class="sample"
      id="voice-sample"
      style="display: none"
      src=""
    ></audio>
  </body>
</html>
