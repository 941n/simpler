<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/text.css" />
    <link rel="stylesheet" href="styles/sampler.css" />

    <script src="scripts/sampleControl.js" defer></script>
    <script src="scripts/sampler.js" defer></script>
  </head>
  <body>
    <h1 id="track-name">runaway</h1>

    <div id="sampler">
      <ul id="pads">
        <li class="pad note" data-path="first_note.m4a"></li>
        <li class="pad note" data-path="second_note.m4a"></li>
        <li class="pad note" data-path="third_note.m4a"></li>
        <li class="pad note" data-path="fourth_note.m4a"></li>
        <li class="pad note" data-path="fiveth_note.m4a"></li>
        <li class="pad note" data-path="sixth_note.m4a"></li>
        <li class="pad note" data-path="seventh_note.m4a"></li>
        <li class="pad note" data-path="eighth_note.m4a"></li>
        <li id="start-intro" class="pad" data-path="start_intro.m4a"></li>
        <li
          id="look-at-you"
          class="pad voice-sample"
          data-path="look_at_you.m4a"
        ></li>
        <li
          id="ladies-and-gentlemen"
          class="pad voice-sample"
          data-path="ladies_and_gentlemen.m4a"
        ></li>
        <li class="pad" data-path=""></li>
        <li class="pad" data-path=""></li>
        <li class="pad" data-path=""></li>
        <li class="pad" data-path=""></li>
        <li class="pad" data-path="" id="pause"></li>
      </ul>
    </div>
    <audio class="sample" id="note-audio" style="display: none"></audio>
    <audio class="sample" id="start-intro-audio" style="display: none"></audio>
    <audio class="sample" id="voice-sample-audio" style="display: none"></audio>
  </body>
</html>
